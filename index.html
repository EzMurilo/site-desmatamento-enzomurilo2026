<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desmatamento</title>
    <style>
        /* algumas coisas neste codigo pesquisei, pesquisei como poderia deixar este codigo melhor e esse é o reultado da atividade (eu fiz a maioria das coisas do site,pesquisei poucas coisas)  */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        
        .titulo {
            background-color: rgb(168, 245, 104);
            color: white;
            padding: 20px;
            height: 80px; 
            flex-shrink: 0; /* Impede de amassar o topo */
        }

        
        .main-content {
            display: flex;
            flex: 1;
            width: 100%;
        }

        
        .divisoria {
            background-color: rgb(0, 0, 0);
            color: white;
            width: 250px;
            padding: 20px;
            flex-shrink: 0;
        }

        
        .linha_link {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px 0;
            border-bottom: 1px solid #333;
            font-size: 18px;
        }

        .linha_link:hover {
            color: rgb(168, 245, 104);
        }

        
        .janela {
            flex: 1; 
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="titulo">
        <h1>Desmatamento</h1>
    </div>

    <div class="main-content">
        <nav class="divisoria">
            <h2>Desmatamento<br></h2>
            <ul>
            <li><a href="https://pt.m.wikipedia.org/wiki/Desflorestação" target="painel" class="linha_link">Wikipédia</a></li>
        <li><a href="https://m.mundoeducacao.uol.com.br/geografia/desmatamento.htm" target="painel" class="linha_link">Mundo Educação</a></li>
           <li><a href="https://www.cnnbrasil.com.br/nacional/desmatamento-no-brasil/" target="painel" class="linha_link">CNN Brasil</a></li>
        </ul>
        </nav>

        <iframe name="painel" class="janela" src="https://pt.m.wikipedia.org/wiki/Desflorestação"></iframe>
    </div>

</body>
</html>
